name: Datapack Auto Fixer (Beet + Mecha)

on:
  push:
    branches: [ main, master ]
    tags: [ '*' ]
  pull_request:
    branches: [ main, master ]

jobs:
  check-and-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      changes_detected: ${{ steps.auto_commit.outputs.changes_detected }}
      git_status: ${{ steps.save_status.outputs.status_lines }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Beet and Mecha
        run: |
          pip install beet mecha

      - name: List all mcfunction files to /tmp
        run: |
          mkdir -p /tmp
          find . -type f -name "*.mcfunction" > /tmp/mcfunction_list.txt
          echo "Found $(wc -l < /tmp/mcfunction_list.txt) mcfunction files"

      - name: Patch mecha compat (colon-space in storage paths + 26.1 time syntax)
        run: |
          find . -name "*.mcfunction" -not -path "./.git/*" \
            -exec grep -lP '[\w.-]+: _' {} \; | \
            xargs --no-run-if-empty sed -i -E 's/([a-z0-9._-]+): _/\1:_/g'
          find . -name "*.mcfunction" -not -path "./.git/*" \
            -exec grep -l 'time of ' {} \; | \
            xargs --no-run-if-empty sed -i -E 's/time of [a-z0-9_:.-]+ /time /g'
          find . -name "*.mcfunction" -not -path "./.git/*" \
            -exec grep -l 'time query day repetition' {} \; | \
            xargs --no-run-if-empty sed -i 's/time query day repetition/time query daytime/g'

      - name: Mecha Validation
        run: |
          echo "Running Mecha validation..."
          python -c '
          import sys
          from mecha import Mecha
          from pathlib import Path

          m = Mecha()
          error_count = 0

          list_file = Path("/tmp/mcfunction_list.txt")
          if not list_file.exists():
              print("No mcfunction files found.")
              sys.exit(0)

          for line in list_file.read_text(encoding="utf-8").splitlines():
              file_path = line.strip()
              if not file_path:
                  continue
              try:
                  with open(file_path, "r", encoding="utf-8") as f:
                      content = f.read()
                  m.compile(content, filename=file_path)
                  print(f"✓ {file_path}")
              except Exception as e:
                  print(f"✗ {file_path} → {e}")
                  error_count += 1

          print(f"Validation finished. Errors: {error_count}")
          if error_count > 0:
              print("Validation failed, but proceeding to auto-fix pipeline...")
          '

      - name: Beet Pipeline Build (with fixes/transforms)
        run: |
          if [ ! -f beet.json ]; then
            cat > beet.json << 'EOF'
          {
            "name": "auto-fixed-datapack",
            "output": "fixed_datapack",
            "pipeline": ["mecha"],
            "data_pack": {
              "load": ["."]
            }
          }
          EOF
          fi
          
          beet build

      - name: Sync Fixed Datapack to Root and Clean Up
        run: |
          TARGET_DIR="fixed_datapack/auto-fixed-datapack_data_pack"
          
          if [ -d "$TARGET_DIR" ]; then
            echo "Syncing changes back to repository root..."
            rsync -av --delete \
              --exclude='.git/' \
              --exclude='.github/' \
              --exclude='fixed_datapack/' \
              "$TARGET_DIR/" .
            
            echo "Cleaning up fixed_datapack folder..."
            rm -rf fixed_datapack/
          else
            echo "Warning: Target directory $TARGET_DIR not found!"
          fi

      - name: Save Git Status for Summary Job
        id: save_status
        run: |
          # Değişen dosyaları JSON uyumlu tek bir satır haline getirir
          STATUS=$(git status --short | tr '\n' ',' | sed 's/,$//')
          echo "status_lines=$STATUS" >> $GITHUB_OUTPUT

      - name: Commit fixes to fixed-bugs branch
        id: auto_commit
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Auto-fix: Mecha validation + Beet pipeline fixes"
          branch: datapack-fixer/fixed-bugs
          create_branch: true
          file_pattern: |
            '*_*_*/data'
            '*_*/data'
            'data/**'
            'pack.mcmeta'
            'beet.json'

  summary:
    runs-on: ubuntu-latest
    needs: check-and-fix
    if: always()
    steps:
      - name: Generate Markdown Summary
        run: |
          echo "### 🚀 Datapack Auto Fixer Summary Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.check-and-fix.outputs.changes_detected }}" = "true" ]; then
            echo "#### 📝 Applied Changes" >> $GITHUB_STEP_SUMMARY
            echo "| Status | File Path |" >> $GITHUB_STEP_SUMMARY
            echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
            
            # Gelen veriyi virgüllerden ayırarak satırlara böler ve tabloya yazar
            IFS=',' read -r -a lines <<< "${{ needs.check-and-fix.outputs.git_status }}"
            for line in "${lines[@]}"; do
              if [ ! -z "$line" ]; then
                status=$(echo "$line" | awk '{print $1}')
                file=$(echo "$line" | awk '{print $2}')
                
                case "$status" in
                  M)   echo "| 🔄 Updated | \`$file\` |" >> $GITHUB_STEP_SUMMARY ;;
                  A|??) echo "| ➕ Added | \`$file\` |" >> $GITHUB_STEP_SUMMARY ;;
                  D)   echo "| ❌ Deleted | \`$file\` |" >> $GITHUB_STEP_SUMMARY ;;
                  *)   echo "| 🛠️ Changed | \`$file\` |" >> $GITHUB_STEP_SUMMARY ;;
                esac
              fi
            done
            
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "✅ Changes have been successfully pushed to the \`datapack-fixer/fixed-bugs\` branch." >> $GITHUB_STEP_SUMMARY
          else
            echo "✨ **Everything is clean!** No file changes or fixes were required." >> $GITHUB_STEP_SUMMARY
          fi
